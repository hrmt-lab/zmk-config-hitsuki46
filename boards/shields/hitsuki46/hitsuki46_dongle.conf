CONFIG_ZMK_SLEEP=n

# Prospector dongle acts as the split central.
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# Host output / pointing support on the dongle central.
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_INPUT=y
CONFIG_XY_CLIPPER=y

# Prospector RING status screen.
CONFIG_PROSPECTOR_STATUS_SCREEN_RING=y
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=60
CONFIG_PROSPECTOR_LAYER_NAME_UPPERCASE=n
CONFIG_PROSPECTOR_SHOW_MODIFIERS=y
CONFIG_PROSPECTOR_DISPLAY_IDLE_TIMEOUT=300
CONFIG_PROSPECTOR_BRIGHTNESS_KEY_CONTROL=y
CONFIG_PROSPECTOR_RING_DARK_TOGGLE_TOUCH=y
CONFIG_PROSPECTOR_RING_LAST_KEY_DISPLAY=y
CONFIG_PROSPECTOR_RING_GESTURE_NAV=y

# CONFIG_LV_Z_VDB_SIZE=25

# Fetch/report both peripheral battery levels on the central dongle.
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# ZMK Studio runs on the USB-connected dongle.
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Keep the central stable with split input + Studio + Prospector display.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_BUF_ACL_TX_COUNT=6
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_L2CAP_TX_MTU=69
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
